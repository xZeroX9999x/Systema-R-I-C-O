name: R-I-C-O Bot v5.0 — Reporte Semanal

on:
  schedule:
    - cron: '0 14 * * 6'
  workflow_dispatch:

env:
  # Suprime warnings de Node 20 en acciones @v4 (inocuos pero ruidosos)
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  analizar-portafolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Crear directorio SIEMPRE antes de cualquier operación con DB
      - name: Preparar directorio de base de datos
        run: mkdir -p db

      # ESTRATEGIA ROBUSTA: Verificar existencia ANTES de descargar
      # Esto evita el fallo de download-artifact@v4 cuando no hay artifact previo
      - name: Verificar si existe artifact de DB
        id: check-artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'posiciones-db-v5',
              per_page: 1
            });
            const exists = artifacts.data.artifacts.length > 0 && 
                           !artifacts.data.artifacts[0].expired;
            core.setOutput('exists', exists.toString());
            console.log(exists ? '✅ Artifact encontrado' : '⚠️ Artifact no encontrado (primera ejecución)');

      # Solo descargar si EXISTE (evita el error fatal de v4)
      - name: Restaurar Base de Datos
        if: steps.check-artifact.outputs.exists == 'true'
        uses: actions/download-artifact@v4
        with:
          name: posiciones-db-v5
          path: db/

      - name: Validar estado local de DB
        run: |
          if [ -f "db/posiciones.db" ]; then
            echo "✅ DB lista: $(ls -lh db/posiciones.db | awk '{print $5}')"
          else
            echo "⚠️ Sin DB previa. El bot creará una nueva."
          fi

      - name: Ejecutar R-I-C-O Bot v5.0
        env:
          EMAIL_DESTINO:    ${{ secrets.EMAIL_DESTINO }}
          EMAIL_USUARIO:    ${{ secrets.EMAIL_USUARIO }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          SMTP_SERVER:      ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          USD_CLP_FALLBACK: ${{ secrets.USD_CLP_FALLBACK }}
          LLM_API_KEY:      ${{ secrets.LLM_API_KEY }}
          LLM_MODEL:        ${{ secrets.LLM_MODEL }}
          COMISION:         ${{ secrets.COMISION }}
          RISK_TARGET:      ${{ secrets.RISK_TARGET }}
          DB_PATH:          db/posiciones.db
        run: python rico_bot.py

      # Subir SOLO si el archivo fue generado exitosamente
      - name: Persistir Base de Datos
        if: hashFiles('db/posiciones.db') != ''
        uses: actions/upload-artifact@v4
        with:
          name: posiciones-db-v5
          path: db/posiciones.db
          retention-days: 90
          overwrite: true
          compression-level: 0

      - name: Guardar log histórico
        run: |
          if [ -f historico_decisiones.csv ]; then
            git config --local user.email "bot@rico.cl"
            git config --local user.name "R-I-C-O Bot"
            git add historico_decisiones.csv
            git diff --cached --quiet || git commit -m "Log automático — $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
