env:
  # Requerido según changelog 2025-09-19 para suprimir warnings de acciones @v4
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  analizar-portafolio:
    steps:
      # ... pasos anteriores ...

      - name: Restaurar Base de Datos (v4)
        uses: actions/download-artifact@v4
        with:
          name: posiciones-db-v5
          path: db/
        continue-on-error: true  # Permite bootstrap sin DB previa

      - name: Persistir Base de Datos
        if: hashFiles('db/posiciones.db') != ''
        uses: actions/upload-artifact@v4
        with:
          name: posiciones-db-v5
          path: db/posiciones.db
          retention-days: 90     # Default oficial según FAQ
          overwrite: true        # Requerido en v4 para actualizar mismo nombre
          compression-level: 0   # Recomendado para SQLite (binario no compresible)
