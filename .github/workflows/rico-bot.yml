name: R-I-C-O Bot v5.0 — Reporte Semanal

on:
  schedule:
    - cron: '0 14 * * 6'
  workflow_dispatch:

jobs:
  analizar-portafolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # PASO CRÍTICO: Crear directorio ANTES de intentar descargar
      - name: Preparar directorio de base de datos
        run: mkdir -p db

      # Descarga tolerante a fallos (primera ejecución o artifact expirado)
      - name: Restaurar Base de Datos (v4)
        uses: actions/download-artifact@v4
        with:
          name: posiciones-db-v5
          path: db/
        continue-on-error: true

      # Verificación explícita de estado
      - name: Validar estado de la DB
        id: check-db
        run: |
          if [ -f "db/posiciones.db" ]; then
            echo "db_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Base de datos encontrada."
          else
            echo "db_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Base de datos NO encontrada. Se iniciará desde cero."
          fi

      - name: Ejecutar R-I-C-O Bot v5.0
        env:
          EMAIL_DESTINO:    ${{ secrets.EMAIL_DESTINO }}
          EMAIL_USUARIO:    ${{ secrets.EMAIL_USUARIO }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          SMTP_SERVER:      ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          USD_CLP_FALLBACK: ${{ secrets.USD_CLP_FALLBACK }}
          LLM_API_KEY:      ${{ secrets.LLM_API_KEY }}
          LLM_MODEL:        ${{ secrets.LLM_MODEL }}
          COMISION:         ${{ secrets.COMISION }}
          RISK_TARGET:      ${{ secrets.RISK_TARGET }}
          DB_PATH:          db/posiciones.db
        run: python rico_bot.py

      # Solo subir si el archivo existe (evita fallo en upload tras bootstrap)
      - name: Persistir Base de Datos (v4)
        if: hashFiles('db/posiciones.db') != ''
        uses: actions/upload-artifact@v4
        with:
          name: posiciones-db-v5
          path: db/posiciones.db
          retention-days: 90
          overwrite: true
          compression-level: 0  # SQLite es binario; compresión 0 = más rápido

      - name: Guardar log histórico
        run: |
          if [ -f historico_decisiones.csv ]; then
            git config --local user.email "bot@rico.cl"
            git config --local user.name "R-I-C-O Bot"
            git add historico_decisiones.csv
            git diff --cached --quiet || git commit -m "Log automático — $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
